name: aerochat

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aerochat}
      POSTGRES_USER: ${POSTGRES_USER:-aerochat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aerochat}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MEDIA_S3_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:8088,http://localhost:8088,http://localhost:5173}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "/bootstrap-media-storage.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET:-aerochat-attachments}
      MEDIA_S3_CORS_ALLOWED_ORIGINS: ${MEDIA_S3_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:8088,http://localhost:8088,http://localhost:5173}
    volumes:
      - ../scripts/bootstrap-media-storage.sh:/bootstrap-media-storage.sh:ro

  aero-identity:
    build:
      context: ../..
      dockerfile: services/aero-identity/Dockerfile
    environment:
      AERO_DATABASE_URL: postgres://${POSTGRES_USER:-aerochat}:${POSTGRES_PASSWORD:-aerochat}@postgres:5432/${POSTGRES_DB:-aerochat}?sslmode=disable
      AERO_HTTP_ADDR: ":8081"
      AERO_LOG_LEVEL: ${AERO_RUNTIME_LOG_LEVEL:-info}
      AERO_SHUTDOWN_TIMEOUT: ${AERO_SHUTDOWN_TIMEOUT:-10s}
      AERO_DATABASE_BOOTSTRAP_TIMEOUT: ${AERO_DATABASE_BOOTSTRAP_TIMEOUT:-30s}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${IDENTITY_PORT:-8091}:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  aero-chat:
    build:
      context: ../..
      dockerfile: services/aero-chat/Dockerfile
    environment:
      AERO_DATABASE_URL: postgres://${POSTGRES_USER:-aerochat}:${POSTGRES_PASSWORD:-aerochat}@postgres:5432/${POSTGRES_DB:-aerochat}?sslmode=disable
      AERO_REDIS_ADDR: redis:6379
      AERO_HTTP_ADDR: ":8082"
      AERO_LOG_LEVEL: ${AERO_RUNTIME_LOG_LEVEL:-info}
      AERO_SHUTDOWN_TIMEOUT: ${AERO_SHUTDOWN_TIMEOUT:-10s}
      AERO_DATABASE_BOOTSTRAP_TIMEOUT: ${AERO_DATABASE_BOOTSTRAP_TIMEOUT:-30s}
      AERO_DIRECT_CHAT_TYPING_TTL: ${AERO_DIRECT_CHAT_TYPING_TTL:-6s}
      AERO_DIRECT_CHAT_PRESENCE_TTL: ${AERO_DIRECT_CHAT_PRESENCE_TTL:-30s}
      AERO_MEDIA_S3_INTERNAL_ENDPOINT: minio:9000
      AERO_MEDIA_S3_PRESIGN_ENDPOINT: ${MEDIA_S3_PUBLIC_ENDPOINT:-http://127.0.0.1:9000}
      AERO_MEDIA_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      AERO_MEDIA_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AERO_MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET:-aerochat-attachments}
      AERO_MEDIA_S3_INTERNAL_SECURE: "false"
      AERO_MEDIA_S3_PRESIGN_SECURE: ${MEDIA_S3_PUBLIC_SECURE:-false}
      AERO_MEDIA_UPLOAD_INTENT_TTL: ${AERO_MEDIA_UPLOAD_INTENT_TTL:-15m}
      AERO_MEDIA_ATTACHMENT_CLEANUP_INTERVAL: ${AERO_MEDIA_ATTACHMENT_CLEANUP_INTERVAL:-10m}
      AERO_MEDIA_UNATTACHED_ATTACHMENT_TTL: ${AERO_MEDIA_UNATTACHED_ATTACHMENT_TTL:-24h}
      AERO_MEDIA_ATTACHMENT_CLEANUP_BATCH_SIZE: ${AERO_MEDIA_ATTACHMENT_CLEANUP_BATCH_SIZE:-100}
      AERO_MEDIA_MAX_UPLOAD_SIZE_BYTES: ${AERO_MEDIA_MAX_UPLOAD_SIZE_BYTES:-67108864}
      AERO_MEDIA_USER_QUOTA_BYTES: ${AERO_MEDIA_USER_QUOTA_BYTES:-536870912}
      AERO_MAX_ACTIVE_GROUP_MEMBERSHIPS_PER_USER: ${AERO_MAX_ACTIVE_GROUP_MEMBERSHIPS_PER_USER:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${CHAT_PORT:-8092}:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  aero-rtc-control:
    build:
      context: ../..
      dockerfile: services/aero-rtc-control/Dockerfile
    environment:
      AERO_DATABASE_URL: postgres://${POSTGRES_USER:-aerochat}:${POSTGRES_PASSWORD:-aerochat}@postgres:5432/${POSTGRES_DB:-aerochat}?sslmode=disable
      AERO_HTTP_ADDR: ":8083"
      AERO_LOG_LEVEL: ${AERO_RUNTIME_LOG_LEVEL:-info}
      AERO_SHUTDOWN_TIMEOUT: ${AERO_SHUTDOWN_TIMEOUT:-10s}
      AERO_DATABASE_BOOTSTRAP_TIMEOUT: ${AERO_DATABASE_BOOTSTRAP_TIMEOUT:-30s}
      AERO_DOWNSTREAM_TIMEOUT: ${AERO_DOWNSTREAM_TIMEOUT:-5s}
      AERO_IDENTITY_URL: http://aero-identity:8081
      AERO_CHAT_URL: http://aero-chat:8082
      AERO_RTC_STUN_URLS: ${AERO_RTC_STUN_URLS:-stun:stun.cloudflare.com:3478}
      AERO_RTC_TURN_URLS: ${AERO_RTC_TURN_URLS:-}
      AERO_RTC_TURN_AUTH_SECRET: ${AERO_RTC_TURN_AUTH_SECRET:-}
      AERO_RTC_TURN_USERNAME_TTL: ${AERO_RTC_TURN_USERNAME_TTL:-10m}
      AERO_RTC_SIGNAL_MAX_PAYLOAD_BYTES: ${AERO_RTC_SIGNAL_MAX_PAYLOAD_BYTES:-16384}
    depends_on:
      postgres:
        condition: service_healthy
      aero-identity:
        condition: service_healthy
      aero-chat:
        condition: service_healthy
    ports:
      - "127.0.0.1:${RTC_CONTROL_PORT:-8093}:8083"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  aero-gateway:
    build:
      context: ../..
      dockerfile: services/aero-gateway/Dockerfile
    environment:
      AERO_HTTP_ADDR: ":8080"
      AERO_LOG_LEVEL: ${AERO_RUNTIME_LOG_LEVEL:-info}
      AERO_SHUTDOWN_TIMEOUT: ${AERO_SHUTDOWN_TIMEOUT:-10s}
      AERO_DOWNSTREAM_TIMEOUT: ${AERO_DOWNSTREAM_TIMEOUT:-5s}
      AERO_IDENTITY_URL: http://aero-identity:8081
      AERO_CHAT_URL: http://aero-chat:8082
      AERO_RTC_CONTROL_URL: http://aero-rtc-control:8083
      AERO_CORS_ALLOWED_ORIGINS: ${AERO_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:8088,http://localhost:8088,http://localhost:5173}
    depends_on:
      aero-identity:
        condition: service_healthy
      aero-chat:
        condition: service_healthy
      aero-rtc-control:
        condition: service_healthy
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GATEWAY_BASE_URL: ${VITE_GATEWAY_BASE_URL:-/api}
        VITE_RTC_ICE_SERVER_URLS: ${VITE_RTC_ICE_SERVER_URLS:-}
    depends_on:
      aero-gateway:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8081}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      web:
        condition: service_healthy
      aero-gateway:
        condition: service_healthy
    ports:
      - "127.0.0.1:${NGINX_PORT:-8088}:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
  minio-data:
