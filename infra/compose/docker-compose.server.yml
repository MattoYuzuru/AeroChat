name: aerochat-server

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MEDIA_S3_CORS_ALLOWED_ORIGINS}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${AERO_SHARED_EDGE_HOST_IP}:${AERO_MEDIA_HOST_PORT}:9000"

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/bootstrap-media-storage.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET}
      MEDIA_S3_CORS_ALLOWED_ORIGINS: ${MEDIA_S3_CORS_ALLOWED_ORIGINS}
    volumes:
      - ../scripts/bootstrap-media-storage.sh:/bootstrap-media-storage.sh:ro

  aero-identity:
    image: ${AERO_IMAGE_NAMESPACE:-ghcr.io/mattoyuzuru}/aerochat-aero-identity:${AERO_IMAGE_TAG:-edge}
    restart: unless-stopped
    environment:
      AERO_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      AERO_HTTP_ADDR: ":8081"
      AERO_LOG_LEVEL: ${AERO_RUNTIME_LOG_LEVEL}
      AERO_SHUTDOWN_TIMEOUT: ${AERO_SHUTDOWN_TIMEOUT}
      AERO_DATABASE_BOOTSTRAP_TIMEOUT: ${AERO_DATABASE_BOOTSTRAP_TIMEOUT}
      AERO_WEB_PUSH_SUBSCRIBER: ${AERO_WEB_PUSH_SUBSCRIBER}
      AERO_WEB_PUSH_VAPID_PUBLIC_KEY: ${AERO_WEB_PUSH_VAPID_PUBLIC_KEY}
      AERO_WEB_PUSH_VAPID_PRIVATE_KEY: ${AERO_WEB_PUSH_VAPID_PRIVATE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  aero-chat:
    image: ${AERO_IMAGE_NAMESPACE:-ghcr.io/mattoyuzuru}/aerochat-aero-chat:${AERO_IMAGE_TAG:-edge}
    restart: unless-stopped
    environment:
      AERO_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      AERO_REDIS_ADDR: redis:6379
      AERO_HTTP_ADDR: ":8082"
      AERO_LOG_LEVEL: ${AERO_RUNTIME_LOG_LEVEL}
      AERO_SHUTDOWN_TIMEOUT: ${AERO_SHUTDOWN_TIMEOUT}
      AERO_DATABASE_BOOTSTRAP_TIMEOUT: ${AERO_DATABASE_BOOTSTRAP_TIMEOUT}
      AERO_DIRECT_CHAT_TYPING_TTL: ${AERO_DIRECT_CHAT_TYPING_TTL}
      AERO_DIRECT_CHAT_PRESENCE_TTL: ${AERO_DIRECT_CHAT_PRESENCE_TTL}
      AERO_MEDIA_S3_INTERNAL_ENDPOINT: minio:9000
      AERO_MEDIA_S3_PRESIGN_ENDPOINT: ${MEDIA_S3_PUBLIC_ENDPOINT}
      AERO_MEDIA_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      AERO_MEDIA_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AERO_MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET}
      AERO_MEDIA_S3_INTERNAL_SECURE: "false"
      AERO_MEDIA_S3_PRESIGN_SECURE: ${MEDIA_S3_PUBLIC_SECURE}
      AERO_MEDIA_UPLOAD_INTENT_TTL: ${AERO_MEDIA_UPLOAD_INTENT_TTL}
      AERO_MEDIA_ATTACHMENT_CLEANUP_INTERVAL: ${AERO_MEDIA_ATTACHMENT_CLEANUP_INTERVAL}
      AERO_MEDIA_UNATTACHED_ATTACHMENT_TTL: ${AERO_MEDIA_UNATTACHED_ATTACHMENT_TTL}
      AERO_MEDIA_ATTACHMENT_CLEANUP_BATCH_SIZE: ${AERO_MEDIA_ATTACHMENT_CLEANUP_BATCH_SIZE}
      AERO_MEDIA_MAX_UPLOAD_SIZE_BYTES: ${AERO_MEDIA_MAX_UPLOAD_SIZE_BYTES}
      AERO_MEDIA_USER_QUOTA_BYTES: ${AERO_MEDIA_USER_QUOTA_BYTES}
      AERO_MAX_ACTIVE_GROUP_MEMBERSHIPS_PER_USER: ${AERO_MAX_ACTIVE_GROUP_MEMBERSHIPS_PER_USER}
      AERO_WEB_PUSH_SUBSCRIBER: ${AERO_WEB_PUSH_SUBSCRIBER}
      AERO_WEB_PUSH_VAPID_PUBLIC_KEY: ${AERO_WEB_PUSH_VAPID_PUBLIC_KEY}
      AERO_WEB_PUSH_VAPID_PRIVATE_KEY: ${AERO_WEB_PUSH_VAPID_PRIVATE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  aero-rtc-control:
    image: ${AERO_IMAGE_NAMESPACE:-ghcr.io/mattoyuzuru}/aerochat-aero-rtc-control:${AERO_IMAGE_TAG:-edge}
    restart: unless-stopped
    environment:
      AERO_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      AERO_HTTP_ADDR: ":8083"
      AERO_LOG_LEVEL: ${AERO_RUNTIME_LOG_LEVEL}
      AERO_SHUTDOWN_TIMEOUT: ${AERO_SHUTDOWN_TIMEOUT}
      AERO_DATABASE_BOOTSTRAP_TIMEOUT: ${AERO_DATABASE_BOOTSTRAP_TIMEOUT}
      AERO_DOWNSTREAM_TIMEOUT: ${AERO_DOWNSTREAM_TIMEOUT}
      AERO_IDENTITY_URL: http://aero-identity:8081
      AERO_CHAT_URL: http://aero-chat:8082
      AERO_RTC_STUN_URLS: ${AERO_RTC_STUN_URLS}
      AERO_RTC_TURN_URLS: ${AERO_RTC_TURN_URLS}
      AERO_RTC_TURN_AUTH_SECRET: ${AERO_RTC_TURN_AUTH_SECRET}
      AERO_RTC_TURN_USERNAME_TTL: ${AERO_RTC_TURN_USERNAME_TTL}
      AERO_RTC_SIGNAL_MAX_PAYLOAD_BYTES: ${AERO_RTC_SIGNAL_MAX_PAYLOAD_BYTES}
    depends_on:
      postgres:
        condition: service_healthy
      aero-identity:
        condition: service_healthy
      aero-chat:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  turn:
    image: coturn/coturn:4.7.0
    restart: unless-stopped
    network_mode: host
    environment:
      AERO_RTC_TURN_AUTH_SECRET: ${AERO_RTC_TURN_AUTH_SECRET}
      AERO_RTC_TURN_REALM: ${AERO_EDGE_DOMAIN}
      AERO_RTC_TURN_LISTEN_PORT: ${AERO_RTC_TURN_LISTEN_PORT:-3478}
      AERO_RTC_TURN_MIN_RELAY_PORT: ${AERO_RTC_TURN_MIN_RELAY_PORT:-49160}
      AERO_RTC_TURN_MAX_RELAY_PORT: ${AERO_RTC_TURN_MAX_RELAY_PORT:-49200}
      AERO_RTC_TURN_EXTERNAL_IP: ${AERO_RTC_TURN_EXTERNAL_IP:-}
      AERO_RTC_TURN_RELAY_IP: ${AERO_RTC_TURN_RELAY_IP:-}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -eu
        args="
          -n
          --log-file=stdout
          --use-auth-secret
          --static-auth-secret $${AERO_RTC_TURN_AUTH_SECRET}
          --realm $${AERO_RTC_TURN_REALM}
          --fingerprint
          --listening-ip 0.0.0.0
          --listening-port $${AERO_RTC_TURN_LISTEN_PORT}
          --min-port $${AERO_RTC_TURN_MIN_RELAY_PORT}
          --max-port $${AERO_RTC_TURN_MAX_RELAY_PORT}
          --no-cli
          --no-tls
          --no-dtls
        "
        if [ -n "$${AERO_RTC_TURN_EXTERNAL_IP:-}" ] && [ -n "$${AERO_RTC_TURN_RELAY_IP:-}" ] && [ "$${AERO_RTC_TURN_EXTERNAL_IP}" != "$${AERO_RTC_TURN_RELAY_IP}" ]; then
          args="$$args --external-ip $${AERO_RTC_TURN_EXTERNAL_IP}/$${AERO_RTC_TURN_RELAY_IP}"
        elif [ -n "$${AERO_RTC_TURN_EXTERNAL_IP:-}" ]; then
          args="$$args --external-ip $${AERO_RTC_TURN_EXTERNAL_IP}"
        fi
        if [ -n "$${AERO_RTC_TURN_RELAY_IP:-}" ]; then
          args="$$args --relay-ip $${AERO_RTC_TURN_RELAY_IP}"
        fi
        exec turnserver $$args

  aero-gateway:
    image: ${AERO_IMAGE_NAMESPACE:-ghcr.io/mattoyuzuru}/aerochat-aero-gateway:${AERO_IMAGE_TAG:-edge}
    restart: unless-stopped
    environment:
      AERO_HTTP_ADDR: ":8080"
      AERO_LOG_LEVEL: ${AERO_RUNTIME_LOG_LEVEL}
      AERO_SHUTDOWN_TIMEOUT: ${AERO_SHUTDOWN_TIMEOUT}
      AERO_DOWNSTREAM_TIMEOUT: ${AERO_DOWNSTREAM_TIMEOUT}
      AERO_IDENTITY_URL: http://aero-identity:8081
      AERO_CHAT_URL: http://aero-chat:8082
      AERO_RTC_CONTROL_URL: http://aero-rtc-control:8083
      AERO_CORS_ALLOWED_ORIGINS: ${AERO_CORS_ALLOWED_ORIGINS}
    depends_on:
      aero-identity:
        condition: service_healthy
      aero-chat:
        condition: service_healthy
      aero-rtc-control:
        condition: service_healthy
    ports:
      - "${AERO_SHARED_EDGE_HOST_IP}:${AERO_GATEWAY_HOST_PORT}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    image: ${AERO_IMAGE_NAMESPACE:-ghcr.io/mattoyuzuru}/aerochat-web:${AERO_IMAGE_TAG:-edge}
    restart: unless-stopped
    depends_on:
      aero-gateway:
        condition: service_healthy
    ports:
      - "${AERO_SHARED_EDGE_HOST_IP}:${AERO_WEB_HOST_PORT}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
  minio-data:
