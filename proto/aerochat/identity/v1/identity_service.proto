syntax = "proto3";

package aerochat.identity.v1;

option go_package = "github.com/MattoYuzuru/AeroChat/gen/go/aerochat/identity/v1;identityv1";

import "aerochat/common/v1/common.proto";
import "google/protobuf/timestamp.proto";

service IdentityService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc LogoutCurrentSession(LogoutCurrentSessionRequest) returns (LogoutCurrentSessionResponse);
  rpc GetCurrentProfile(GetCurrentProfileRequest) returns (GetCurrentProfileResponse);
  rpc UpdateCurrentProfile(UpdateCurrentProfileRequest) returns (UpdateCurrentProfileResponse);
  rpc GetWebPushPublicKey(GetWebPushPublicKeyRequest) returns (GetWebPushPublicKeyResponse);
  rpc UpsertWebPushSubscription(UpsertWebPushSubscriptionRequest) returns (UpsertWebPushSubscriptionResponse);
  rpc DeleteWebPushSubscription(DeleteWebPushSubscriptionRequest) returns (DeleteWebPushSubscriptionResponse);
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc RevokeSessionOrDevice(RevokeSessionOrDeviceRequest) returns (RevokeSessionOrDeviceResponse);
  rpc ListBlockedUsers(ListBlockedUsersRequest) returns (ListBlockedUsersResponse);
  rpc BlockUser(BlockUserRequest) returns (BlockUserResponse);
  rpc UnblockUser(UnblockUserRequest) returns (UnblockUserResponse);
  rpc SendFriendRequest(SendFriendRequestRequest) returns (SendFriendRequestResponse);
  rpc AcceptFriendRequest(AcceptFriendRequestRequest) returns (AcceptFriendRequestResponse);
  rpc DeclineFriendRequest(DeclineFriendRequestRequest) returns (DeclineFriendRequestResponse);
  rpc CancelOutgoingFriendRequest(CancelOutgoingFriendRequestRequest) returns (CancelOutgoingFriendRequestResponse);
  rpc ListIncomingFriendRequests(ListIncomingFriendRequestsRequest) returns (ListIncomingFriendRequestsResponse);
  rpc ListOutgoingFriendRequests(ListOutgoingFriendRequestsRequest) returns (ListOutgoingFriendRequestsResponse);
  rpc ListFriends(ListFriendsRequest) returns (ListFriendsResponse);
  rpc RemoveFriend(RemoveFriendRequest) returns (RemoveFriendResponse);
  rpc RegisterFirstCryptoDevice(RegisterFirstCryptoDeviceRequest) returns (RegisterFirstCryptoDeviceResponse);
  rpc RegisterPendingLinkedCryptoDevice(RegisterPendingLinkedCryptoDeviceRequest) returns (RegisterPendingLinkedCryptoDeviceResponse);
  rpc ListCryptoDevices(ListCryptoDevicesRequest) returns (ListCryptoDevicesResponse);
  rpc GetCryptoDevice(GetCryptoDeviceRequest) returns (GetCryptoDeviceResponse);
  rpc CreateCryptoDeviceBundlePublishChallenge(CreateCryptoDeviceBundlePublishChallengeRequest) returns (CreateCryptoDeviceBundlePublishChallengeResponse);
  rpc PublishCryptoDeviceBundle(PublishCryptoDeviceBundleRequest) returns (PublishCryptoDeviceBundleResponse);
  rpc CreateCryptoDeviceLinkIntent(CreateCryptoDeviceLinkIntentRequest) returns (CreateCryptoDeviceLinkIntentResponse);
  rpc ListCryptoDeviceLinkIntents(ListCryptoDeviceLinkIntentsRequest) returns (ListCryptoDeviceLinkIntentsResponse);
  rpc ApproveCryptoDeviceLinkIntent(ApproveCryptoDeviceLinkIntentRequest) returns (ApproveCryptoDeviceLinkIntentResponse);
  rpc ExpireCryptoDeviceLinkIntent(ExpireCryptoDeviceLinkIntentRequest) returns (ExpireCryptoDeviceLinkIntentResponse);
  rpc RevokeCryptoDevice(RevokeCryptoDeviceRequest) returns (RevokeCryptoDeviceResponse);
}

enum KeyBackupStatus {
  KEY_BACKUP_STATUS_UNSPECIFIED = 0;
  KEY_BACKUP_STATUS_NOT_CONFIGURED = 1;
  KEY_BACKUP_STATUS_CONFIGURED = 2;
}

enum CryptoDeviceStatus {
  CRYPTO_DEVICE_STATUS_UNSPECIFIED = 0;
  CRYPTO_DEVICE_STATUS_PENDING_LINK = 1;
  CRYPTO_DEVICE_STATUS_ACTIVE = 2;
  CRYPTO_DEVICE_STATUS_REVOKED = 3;
}

enum CryptoDeviceLinkIntentStatus {
  CRYPTO_DEVICE_LINK_INTENT_STATUS_UNSPECIFIED = 0;
  CRYPTO_DEVICE_LINK_INTENT_STATUS_PENDING = 1;
  CRYPTO_DEVICE_LINK_INTENT_STATUS_APPROVED = 2;
  CRYPTO_DEVICE_LINK_INTENT_STATUS_EXPIRED = 3;
}

message Profile {
  string id = 1;
  string login = 2;
  string nickname = 3;
  optional string avatar_url = 4;
  optional string bio = 5;
  optional string timezone = 6;
  optional string profile_accent = 7;
  optional string status_text = 8;
  optional string birthday = 9;
  optional string country = 10;
  optional string city = 11;
  bool read_receipts_enabled = 12;
  bool presence_enabled = 13;
  bool typing_visibility_enabled = 14;
  KeyBackupStatus key_backup_status = 15;
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp updated_at = 17;
  bool push_notifications_enabled = 18;
}

message Device {
  string id = 1;
  string label = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp last_seen_at = 4;
  optional google.protobuf.Timestamp revoked_at = 5;
}

message Session {
  string id = 1;
  string device_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp last_seen_at = 4;
  optional google.protobuf.Timestamp revoked_at = 5;
}

message DeviceWithSessions {
  Device device = 1;
  repeated Session sessions = 2;
}

message BlockedUser {
  Profile profile = 1;
  google.protobuf.Timestamp blocked_at = 2;
}

message FriendRequest {
  Profile profile = 1;
  google.protobuf.Timestamp requested_at = 2;
}

message Friend {
  Profile profile = 1;
  google.protobuf.Timestamp friends_since = 2;
}

message CurrentAuth {
  Profile profile = 1;
  Device device = 2;
  Session session = 3;
  string session_token = 4;
}

message CryptoDevice {
  string id = 1;
  string user_id = 2;
  string label = 3;
  CryptoDeviceStatus status = 4;
  optional string linked_by_crypto_device_id = 5;
  optional uint64 last_bundle_version = 6;
  optional google.protobuf.Timestamp last_bundle_published_at = 7;
  google.protobuf.Timestamp created_at = 8;
  optional google.protobuf.Timestamp activated_at = 9;
  optional google.protobuf.Timestamp revoked_at = 10;
  optional string revocation_reason = 11;
  optional string revoked_by_actor = 12;
}

message CryptoDeviceBundlePayload {
  string crypto_suite = 1;
  bytes identity_public_key = 2;
  bytes signed_prekey_public = 3;
  string signed_prekey_id = 4;
  bytes signed_prekey_signature = 5;
  bytes kem_public_key = 6;
  string kem_key_id = 7;
  bytes kem_signature = 8;
  uint32 one_time_prekeys_total = 9;
  uint32 one_time_prekeys_available = 10;
  bytes bundle_digest = 11;
  google.protobuf.Timestamp expires_at = 12;
}

message CryptoDeviceBundle {
  string crypto_device_id = 1;
  uint64 bundle_version = 2;
  string crypto_suite = 3;
  bytes identity_public_key = 4;
  bytes signed_prekey_public = 5;
  string signed_prekey_id = 6;
  bytes signed_prekey_signature = 7;
  bytes kem_public_key = 8;
  string kem_key_id = 9;
  bytes kem_signature = 10;
  uint32 one_time_prekeys_total = 11;
  uint32 one_time_prekeys_available = 12;
  bytes bundle_digest = 13;
  google.protobuf.Timestamp published_at = 14;
  google.protobuf.Timestamp expires_at = 15;
  google.protobuf.Timestamp superseded_at = 16;
}

message CryptoDeviceBundlePublishChallenge {
  string crypto_device_id = 1;
  uint64 current_bundle_version = 2;
  bytes current_bundle_digest = 3;
  bytes publish_challenge = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp expires_at = 6;
}

message CryptoDeviceBundlePublishProofPayload {
  uint32 version = 1;
  string crypto_device_id = 2;
  uint64 previous_bundle_version = 3;
  bytes previous_bundle_digest = 4;
  bytes new_bundle_digest = 5;
  bytes publish_challenge = 6;
  google.protobuf.Timestamp challenge_expires_at = 7;
  google.protobuf.Timestamp issued_at = 8;
}

message CryptoDeviceBundlePublishProof {
  CryptoDeviceBundlePublishProofPayload payload = 1;
  bytes signature = 2;
}

message CryptoDeviceLinkIntent {
  string id = 1;
  string user_id = 2;
  string pending_crypto_device_id = 3;
  CryptoDeviceLinkIntentStatus status = 4;
  bytes bundle_digest = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp expires_at = 7;
  google.protobuf.Timestamp approved_at = 8;
  google.protobuf.Timestamp expired_at = 9;
  optional string approver_crypto_device_id = 10;
  bytes approval_challenge = 11;
}

message CryptoDeviceLinkApprovalPayload {
  uint32 version = 1;
  string link_intent_id = 2;
  string approver_crypto_device_id = 3;
  string pending_crypto_device_id = 4;
  bytes pending_bundle_digest = 5;
  bytes approval_challenge = 6;
  google.protobuf.Timestamp challenge_expires_at = 7;
  google.protobuf.Timestamp issued_at = 8;
}

message CryptoDeviceLinkApprovalProof {
  CryptoDeviceLinkApprovalPayload payload = 1;
  bytes signature = 2;
}

message PingRequest {}

message PingResponse {
  aerochat.common.v1.ServiceMeta service = 1;
}

message RegisterRequest {
  string login = 1;
  string password = 2;
  string nickname = 3;
  optional string device_label = 4;
}

message RegisterResponse {
  CurrentAuth auth = 1;
}

message LoginRequest {
  string login = 1;
  string password = 2;
  optional string device_label = 3;
}

message LoginResponse {
  CurrentAuth auth = 1;
}

message LogoutCurrentSessionRequest {}

message LogoutCurrentSessionResponse {}

message GetCurrentProfileRequest {}

message GetCurrentProfileResponse {
  Profile profile = 1;
}

message UpdateCurrentProfileRequest {
  optional string nickname = 1;
  optional string avatar_url = 2;
  optional string bio = 3;
  optional string timezone = 4;
  optional string profile_accent = 5;
  optional string status_text = 6;
  optional string birthday = 7;
  optional string country = 8;
  optional string city = 9;
  optional bool read_receipts_enabled = 10;
  optional bool presence_enabled = 11;
  optional bool typing_visibility_enabled = 12;
  optional bool push_notifications_enabled = 13;
}

message UpdateCurrentProfileResponse {
  Profile profile = 1;
}

message GetWebPushPublicKeyRequest {}

message GetWebPushPublicKeyResponse {
  bool available = 1;
  string public_key = 2;
}

message UpsertWebPushSubscriptionRequest {
  string endpoint = 1;
  string p256dh_key = 2;
  string auth_secret = 3;
  optional google.protobuf.Timestamp expiration_time = 4;
  optional string user_agent = 5;
}

message UpsertWebPushSubscriptionResponse {}

message DeleteWebPushSubscriptionRequest {
  string endpoint = 1;
}

message DeleteWebPushSubscriptionResponse {}

message ListDevicesRequest {}

message ListDevicesResponse {
  repeated DeviceWithSessions devices = 1;
}

message RevokeSessionOrDeviceRequest {
  oneof target {
    string session_id = 1;
    string device_id = 2;
  }
}

message RevokeSessionOrDeviceResponse {}

message ListBlockedUsersRequest {}

message ListBlockedUsersResponse {
  repeated BlockedUser blocked_users = 1;
}

message BlockUserRequest {
  string login = 1;
}

message BlockUserResponse {}

message UnblockUserRequest {
  string login = 1;
}

message UnblockUserResponse {}

message SendFriendRequestRequest {
  string login = 1;
}

message SendFriendRequestResponse {}

message AcceptFriendRequestRequest {
  string login = 1;
}

message AcceptFriendRequestResponse {}

message DeclineFriendRequestRequest {
  string login = 1;
}

message DeclineFriendRequestResponse {}

message CancelOutgoingFriendRequestRequest {
  string login = 1;
}

message CancelOutgoingFriendRequestResponse {}

message ListIncomingFriendRequestsRequest {}

message ListIncomingFriendRequestsResponse {
  repeated FriendRequest friend_requests = 1;
}

message ListOutgoingFriendRequestsRequest {}

message ListOutgoingFriendRequestsResponse {
  repeated FriendRequest friend_requests = 1;
}

message ListFriendsRequest {}

message ListFriendsResponse {
  repeated Friend friends = 1;
}

message RemoveFriendRequest {
  string login = 1;
}

message RemoveFriendResponse {}

message RegisterFirstCryptoDeviceRequest {
  optional string device_label = 1;
  CryptoDeviceBundlePayload bundle = 2;
}

message RegisterFirstCryptoDeviceResponse {
  CryptoDevice device = 1;
  CryptoDeviceBundle current_bundle = 2;
}

message RegisterPendingLinkedCryptoDeviceRequest {
  optional string device_label = 1;
  CryptoDeviceBundlePayload bundle = 2;
}

message RegisterPendingLinkedCryptoDeviceResponse {
  CryptoDevice device = 1;
  CryptoDeviceBundle current_bundle = 2;
}

message ListCryptoDevicesRequest {}

message ListCryptoDevicesResponse {
  repeated CryptoDevice devices = 1;
}

message GetCryptoDeviceRequest {
  string crypto_device_id = 1;
}

message GetCryptoDeviceResponse {
  CryptoDevice device = 1;
  CryptoDeviceBundle current_bundle = 2;
}

message CreateCryptoDeviceBundlePublishChallengeRequest {
  string crypto_device_id = 1;
}

message CreateCryptoDeviceBundlePublishChallengeResponse {
  CryptoDeviceBundlePublishChallenge challenge = 1;
}

message PublishCryptoDeviceBundleRequest {
  string crypto_device_id = 1;
  CryptoDeviceBundlePayload bundle = 2;
  CryptoDeviceBundlePublishProof proof = 3;
}

message PublishCryptoDeviceBundleResponse {
  CryptoDevice device = 1;
  CryptoDeviceBundle current_bundle = 2;
}

message CreateCryptoDeviceLinkIntentRequest {
  string pending_crypto_device_id = 1;
}

message CreateCryptoDeviceLinkIntentResponse {
  CryptoDeviceLinkIntent link_intent = 1;
}

message ListCryptoDeviceLinkIntentsRequest {}

message ListCryptoDeviceLinkIntentsResponse {
  repeated CryptoDeviceLinkIntent link_intents = 1;
}

message ApproveCryptoDeviceLinkIntentRequest {
  string link_intent_id = 1;
  string approver_crypto_device_id = 2;
  CryptoDeviceLinkApprovalProof proof = 3;
}

message ApproveCryptoDeviceLinkIntentResponse {
  CryptoDeviceLinkIntent link_intent = 1;
  CryptoDevice device = 2;
}

message ExpireCryptoDeviceLinkIntentRequest {
  string link_intent_id = 1;
}

message ExpireCryptoDeviceLinkIntentResponse {
  CryptoDeviceLinkIntent link_intent = 1;
}

message RevokeCryptoDeviceRequest {
  string crypto_device_id = 1;
  optional string revocation_reason = 2;
}

message RevokeCryptoDeviceResponse {
  CryptoDevice device = 1;
}
