syntax = "proto3";

package aerochat.chat.v1;

option go_package = "github.com/MattoYuzuru/AeroChat/gen/go/aerochat/chat/v1;chatv1";

import "aerochat/common/v1/common.proto";
import "google/protobuf/timestamp.proto";

service ChatService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc CreateDirectChat(CreateDirectChatRequest) returns (CreateDirectChatResponse);
  rpc ListDirectChats(ListDirectChatsRequest) returns (ListDirectChatsResponse);
  rpc GetDirectChat(GetDirectChatRequest) returns (GetDirectChatResponse);
  rpc CreateAttachmentUploadIntent(CreateAttachmentUploadIntentRequest) returns (CreateAttachmentUploadIntentResponse);
  rpc CompleteAttachmentUpload(CompleteAttachmentUploadRequest) returns (CompleteAttachmentUploadResponse);
  rpc GetAttachment(GetAttachmentRequest) returns (GetAttachmentResponse);
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);
  rpc GetGroup(GetGroupRequest) returns (GetGroupResponse);
  rpc GetGroupChat(GetGroupChatRequest) returns (GetGroupChatResponse);
  rpc ListGroupMembers(ListGroupMembersRequest) returns (ListGroupMembersResponse);
  rpc UpdateGroupMemberRole(UpdateGroupMemberRoleRequest) returns (UpdateGroupMemberRoleResponse);
  rpc TransferGroupOwnership(TransferGroupOwnershipRequest) returns (TransferGroupOwnershipResponse);
  rpc RemoveGroupMember(RemoveGroupMemberRequest) returns (RemoveGroupMemberResponse);
  rpc LeaveGroup(LeaveGroupRequest) returns (LeaveGroupResponse);
  rpc RestrictGroupMember(RestrictGroupMemberRequest) returns (RestrictGroupMemberResponse);
  rpc UnrestrictGroupMember(UnrestrictGroupMemberRequest) returns (UnrestrictGroupMemberResponse);
  rpc CreateGroupInviteLink(CreateGroupInviteLinkRequest) returns (CreateGroupInviteLinkResponse);
  rpc ListGroupInviteLinks(ListGroupInviteLinksRequest) returns (ListGroupInviteLinksResponse);
  rpc DisableGroupInviteLink(DisableGroupInviteLinkRequest) returns (DisableGroupInviteLinkResponse);
  rpc JoinGroupByInviteLink(JoinGroupByInviteLinkRequest) returns (JoinGroupByInviteLinkResponse);
  rpc SetGroupTyping(SetGroupTypingRequest) returns (SetGroupTypingResponse);
  rpc ClearGroupTyping(ClearGroupTypingRequest) returns (ClearGroupTypingResponse);
  rpc MarkGroupChatRead(MarkGroupChatReadRequest) returns (MarkGroupChatReadResponse);
  rpc MarkDirectChatRead(MarkDirectChatReadRequest) returns (MarkDirectChatReadResponse);
  rpc SetDirectChatTyping(SetDirectChatTypingRequest) returns (SetDirectChatTypingResponse);
  rpc ClearDirectChatTyping(ClearDirectChatTypingRequest) returns (ClearDirectChatTypingResponse);
  rpc SetDirectChatPresenceHeartbeat(SetDirectChatPresenceHeartbeatRequest) returns (SetDirectChatPresenceHeartbeatResponse);
  rpc ClearDirectChatPresence(ClearDirectChatPresenceRequest) returns (ClearDirectChatPresenceResponse);
  rpc SendTextMessage(SendTextMessageRequest) returns (SendTextMessageResponse);
  rpc EditDirectChatMessage(EditDirectChatMessageRequest) returns (EditDirectChatMessageResponse);
  rpc ListDirectChatMessages(ListDirectChatMessagesRequest) returns (ListDirectChatMessagesResponse);
  rpc ListGroupMessages(ListGroupMessagesRequest) returns (ListGroupMessagesResponse);
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);
  rpc SendGroupTextMessage(SendGroupTextMessageRequest) returns (SendGroupTextMessageResponse);
  rpc EditGroupMessage(EditGroupMessageRequest) returns (EditGroupMessageResponse);
  rpc DeleteMessageForEveryone(DeleteMessageForEveryoneRequest) returns (DeleteMessageForEveryoneResponse);
  rpc PinMessage(PinMessageRequest) returns (PinMessageResponse);
  rpc UnpinMessage(UnpinMessageRequest) returns (UnpinMessageResponse);
}

enum ChatKind {
  CHAT_KIND_UNSPECIFIED = 0;
  CHAT_KIND_DIRECT = 1;
  CHAT_KIND_GROUP = 2;
}

enum MessageKind {
  MESSAGE_KIND_UNSPECIFIED = 0;
  MESSAGE_KIND_TEXT = 1;
}

enum MarkdownPolicy {
  MARKDOWN_POLICY_UNSPECIFIED = 0;
  MARKDOWN_POLICY_SAFE_SUBSET_V1 = 1;
}

enum AttachmentScope {
  ATTACHMENT_SCOPE_UNSPECIFIED = 0;
  ATTACHMENT_SCOPE_DIRECT_CHAT = 1;
  ATTACHMENT_SCOPE_GROUP = 2;
}

enum AttachmentStatus {
  ATTACHMENT_STATUS_UNSPECIFIED = 0;
  ATTACHMENT_STATUS_PENDING = 1;
  ATTACHMENT_STATUS_UPLOADED = 2;
  ATTACHMENT_STATUS_ATTACHED = 3;
  ATTACHMENT_STATUS_FAILED = 4;
  ATTACHMENT_STATUS_DELETED = 5;
  ATTACHMENT_STATUS_EXPIRED = 6;
}

enum AttachmentUploadSessionStatus {
  ATTACHMENT_UPLOAD_SESSION_STATUS_UNSPECIFIED = 0;
  ATTACHMENT_UPLOAD_SESSION_STATUS_PENDING = 1;
  ATTACHMENT_UPLOAD_SESSION_STATUS_COMPLETED = 2;
  ATTACHMENT_UPLOAD_SESSION_STATUS_FAILED = 3;
  ATTACHMENT_UPLOAD_SESSION_STATUS_EXPIRED = 4;
}

enum GroupMemberRole {
  GROUP_MEMBER_ROLE_UNSPECIFIED = 0;
  GROUP_MEMBER_ROLE_OWNER = 1;
  GROUP_MEMBER_ROLE_ADMIN = 2;
  GROUP_MEMBER_ROLE_MEMBER = 3;
  GROUP_MEMBER_ROLE_READER = 4;
}

enum MessageSearchScopeKind {
  MESSAGE_SEARCH_SCOPE_KIND_UNSPECIFIED = 0;
  MESSAGE_SEARCH_SCOPE_KIND_DIRECT = 1;
  MESSAGE_SEARCH_SCOPE_KIND_GROUP = 2;
}

message ChatUser {
  string id = 1;
  string login = 2;
  string nickname = 3;
  optional string avatar_url = 4;
}

message DirectChat {
  string id = 1;
  ChatKind kind = 2;
  repeated ChatUser participants = 3;
  repeated string pinned_message_ids = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  DirectChatUnreadState unread_state = 7;
}

message Group {
  string id = 1;
  string name = 2;
  ChatKind kind = 3;
  GroupMemberRole self_role = 4;
  uint32 member_count = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  GroupUnreadState unread_state = 8;
  GroupPermissions permissions = 9;
}

message GroupPermissions {
  bool can_manage_invite_links = 1;
  repeated GroupMemberRole creatable_invite_roles = 2;
  bool can_manage_member_roles = 3;
  repeated GroupMemberRole role_management_target_roles = 4;
  repeated GroupMemberRole assignable_roles = 5;
  bool can_transfer_ownership = 6;
  repeated GroupMemberRole removable_member_roles = 7;
  repeated GroupMemberRole restrictable_member_roles = 8;
  bool can_leave_group = 9;
}

message GroupMember {
  ChatUser user = 1;
  GroupMemberRole role = 2;
  google.protobuf.Timestamp joined_at = 3;
  bool is_write_restricted = 4;
  google.protobuf.Timestamp write_restricted_at = 5;
}

message GroupInviteLink {
  string id = 1;
  string group_id = 2;
  GroupMemberRole role = 3;
  string created_by_user_id = 4;
  uint32 join_count = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  google.protobuf.Timestamp disabled_at = 8;
  google.protobuf.Timestamp last_joined_at = 9;
}

message GroupChatThread {
  string id = 1;
  string group_id = 2;
  string thread_key = 3;
  bool can_send_messages = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message GroupTypingIndicator {
  ChatUser user = 1;
  google.protobuf.Timestamp updated_at = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message GroupTypingState {
  string thread_id = 1;
  repeated GroupTypingIndicator typers = 2;
}

message TextMessageContent {
  string text = 1;
  MarkdownPolicy markdown_policy = 2;
}

message ReplyPreview {
  string message_id = 1;
  ChatUser author = 2;
  bool has_text = 3;
  string text_preview = 4;
  uint32 attachment_count = 5;
  bool is_deleted = 6;
  bool is_unavailable = 7;
}

message Attachment {
  string id = 1;
  string owner_user_id = 2;
  AttachmentScope scope = 3;
  string direct_chat_id = 4;
  string group_id = 5;
  string message_id = 6;
  string file_name = 7;
  string mime_type = 8;
  uint64 size_bytes = 9;
  AttachmentStatus status = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  google.protobuf.Timestamp uploaded_at = 13;
  google.protobuf.Timestamp attached_at = 14;
  google.protobuf.Timestamp failed_at = 15;
  google.protobuf.Timestamp deleted_at = 16;
}

message AttachmentUploadSession {
  string id = 1;
  string attachment_id = 2;
  AttachmentUploadSessionStatus status = 3;
  string upload_url = 4;
  string http_method = 5;
  map<string, string> headers = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  google.protobuf.Timestamp expires_at = 9;
  google.protobuf.Timestamp completed_at = 10;
  google.protobuf.Timestamp failed_at = 11;
}

message MessageTombstone {
  string deleted_by_user_id = 1;
  google.protobuf.Timestamp deleted_at = 2;
}

message DirectChatMessage {
  string id = 1;
  string chat_id = 2;
  string sender_user_id = 3;
  MessageKind kind = 4;
  optional TextMessageContent text = 5;
  optional MessageTombstone tombstone = 6;
  bool pinned = 7;
  repeated Attachment attachments = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  google.protobuf.Timestamp edited_at = 11;
  optional string reply_to_message_id = 12;
  ReplyPreview reply_preview = 13;
}

message GroupMessage {
  string id = 1;
  string group_id = 2;
  string thread_id = 3;
  string sender_user_id = 4;
  MessageKind kind = 5;
  optional TextMessageContent text = 6;
  repeated Attachment attachments = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.Timestamp edited_at = 10;
  optional string reply_to_message_id = 11;
  ReplyPreview reply_preview = 12;
}

message DirectChatReadPosition {
  string message_id = 1;
  google.protobuf.Timestamp message_created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message GroupReadPosition {
  string message_id = 1;
  google.protobuf.Timestamp message_created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message DirectChatUnreadState {
  uint32 unread_count = 1;
}

message GroupUnreadState {
  uint32 unread_count = 1;
}

message DirectChatReadState {
  DirectChatReadPosition self_position = 1;
  DirectChatReadPosition peer_position = 2;
}

message GroupReadState {
  GroupReadPosition self_position = 1;
}

message DirectChatTypingIndicator {
  google.protobuf.Timestamp updated_at = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message DirectChatTypingState {
  DirectChatTypingIndicator self_typing = 1;
  DirectChatTypingIndicator peer_typing = 2;
}

message DirectChatPresenceIndicator {
  google.protobuf.Timestamp heartbeat_at = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message DirectChatPresenceState {
  DirectChatPresenceIndicator self_presence = 1;
  DirectChatPresenceIndicator peer_presence = 2;
}

message PingRequest {}

message PingResponse {
  aerochat.common.v1.ServiceMeta service = 1;
}

message CreateDirectChatRequest {
  string peer_user_id = 1;
}

message CreateDirectChatResponse {
  DirectChat chat = 1;
}

message ListDirectChatsRequest {}

message ListDirectChatsResponse {
  repeated DirectChat chats = 1;
}

message GetDirectChatRequest {
  string chat_id = 1;
}

message GetDirectChatResponse {
  DirectChat chat = 1;
  DirectChatReadState read_state = 2;
  DirectChatTypingState typing_state = 3;
  DirectChatPresenceState presence_state = 4;
}

message CreateAttachmentUploadIntentRequest {
  oneof scope_target {
    string direct_chat_id = 1;
    string group_id = 2;
  }
  string file_name = 3;
  string mime_type = 4;
  uint64 size_bytes = 5;
}

message CreateAttachmentUploadIntentResponse {
  Attachment attachment = 1;
  AttachmentUploadSession upload_session = 2;
}

message CompleteAttachmentUploadRequest {
  string attachment_id = 1;
  string upload_session_id = 2;
}

message CompleteAttachmentUploadResponse {
  Attachment attachment = 1;
}

message GetAttachmentRequest {
  string attachment_id = 1;
}

message GetAttachmentResponse {
  Attachment attachment = 1;
  string download_url = 2;
  google.protobuf.Timestamp download_expires_at = 3;
}

message CreateGroupRequest {
  string name = 1;
}

message CreateGroupResponse {
  Group group = 1;
}

message ListGroupsRequest {}

message ListGroupsResponse {
  repeated Group groups = 1;
}

message GetGroupRequest {
  string group_id = 1;
}

message GetGroupResponse {
  Group group = 1;
}

message GetGroupChatRequest {
  string group_id = 1;
}

message GetGroupChatResponse {
  Group group = 1;
  GroupChatThread thread = 2;
  GroupTypingState typing_state = 3;
  GroupReadState read_state = 4;
}

message ListGroupMembersRequest {
  string group_id = 1;
}

message ListGroupMembersResponse {
  repeated GroupMember members = 1;
}

message UpdateGroupMemberRoleRequest {
  string group_id = 1;
  string user_id = 2;
  GroupMemberRole role = 3;
}

message UpdateGroupMemberRoleResponse {
  GroupMember member = 1;
}

message TransferGroupOwnershipRequest {
  string group_id = 1;
  string target_user_id = 2;
}

message TransferGroupOwnershipResponse {
  Group group = 1;
}

message RemoveGroupMemberRequest {
  string group_id = 1;
  string user_id = 2;
}

message RemoveGroupMemberResponse {}

message LeaveGroupRequest {
  string group_id = 1;
}

message LeaveGroupResponse {}

message RestrictGroupMemberRequest {
  string group_id = 1;
  string user_id = 2;
}

message RestrictGroupMemberResponse {
  GroupMember member = 1;
}

message UnrestrictGroupMemberRequest {
  string group_id = 1;
  string user_id = 2;
}

message UnrestrictGroupMemberResponse {
  GroupMember member = 1;
}

message CreateGroupInviteLinkRequest {
  string group_id = 1;
  GroupMemberRole role = 2;
}

message CreateGroupInviteLinkResponse {
  GroupInviteLink invite_link = 1;
  string invite_token = 2;
}

message ListGroupInviteLinksRequest {
  string group_id = 1;
}

message ListGroupInviteLinksResponse {
  repeated GroupInviteLink invite_links = 1;
}

message DisableGroupInviteLinkRequest {
  string group_id = 1;
  string invite_link_id = 2;
}

message DisableGroupInviteLinkResponse {
  GroupInviteLink invite_link = 1;
}

message JoinGroupByInviteLinkRequest {
  string invite_token = 1;
}

message JoinGroupByInviteLinkResponse {
  Group group = 1;
}

message SetGroupTypingRequest {
  string group_id = 1;
  string thread_id = 2;
}

message SetGroupTypingResponse {
  GroupTypingState typing_state = 1;
}

message ClearGroupTypingRequest {
  string group_id = 1;
  string thread_id = 2;
}

message ClearGroupTypingResponse {
  GroupTypingState typing_state = 1;
}

message MarkGroupChatReadRequest {
  string group_id = 1;
  string message_id = 2;
}

message MarkGroupChatReadResponse {
  GroupReadState read_state = 1;
  GroupUnreadState unread_state = 2;
}

message MarkDirectChatReadRequest {
  string chat_id = 1;
  string message_id = 2;
}

message MarkDirectChatReadResponse {
  DirectChatReadState read_state = 1;
  DirectChatUnreadState unread_state = 2;
}

message SetDirectChatTypingRequest {
  string chat_id = 1;
}

message SetDirectChatTypingResponse {
  DirectChatTypingState typing_state = 1;
}

message ClearDirectChatTypingRequest {
  string chat_id = 1;
}

message ClearDirectChatTypingResponse {
  DirectChatTypingState typing_state = 1;
}

message SetDirectChatPresenceHeartbeatRequest {
  string chat_id = 1;
}

message SetDirectChatPresenceHeartbeatResponse {
  DirectChatPresenceState presence_state = 1;
}

message ClearDirectChatPresenceRequest {
  string chat_id = 1;
}

message ClearDirectChatPresenceResponse {
  DirectChatPresenceState presence_state = 1;
}

message SendTextMessageRequest {
  string chat_id = 1;
  // text остаётся optional-by-semantics: attachment-only сообщение передаёт пустую строку.
  // Полностью пустое сообщение без text и attachment_ids запрещено доменно.
  string text = 2;
  repeated string attachment_ids = 3;
  optional string reply_to_message_id = 4;
}

message SendTextMessageResponse {
  DirectChatMessage message = 1;
}

message EditDirectChatMessageRequest {
  string chat_id = 1;
  string message_id = 2;
  // text обязателен для edit: attachment-only message не получает synthetic text semantics.
  string text = 3;
}

message EditDirectChatMessageResponse {
  DirectChatMessage message = 1;
}

message ListDirectChatMessagesRequest {
  string chat_id = 1;
  uint32 page_size = 2;
}

message ListDirectChatMessagesResponse {
  repeated DirectChatMessage messages = 1;
}

message ListGroupMessagesRequest {
  string group_id = 1;
  uint32 page_size = 2;
}

message ListGroupMessagesResponse {
  repeated GroupMessage messages = 1;
}

message SearchDirectMessagesScope {
  // Пустой chat_id означает поиск по всем direct chats, доступным текущему пользователю.
  string chat_id = 1;
}

message SearchGroupMessagesScope {
  // Пустой group_id означает поиск по всем группам, где пользователь сейчас состоит.
  string group_id = 1;
}

message MessageSearchCursor {
  google.protobuf.Timestamp message_created_at = 1;
  string message_id = 2;
}

message MessageSearchPosition {
  string message_id = 1;
  google.protobuf.Timestamp message_created_at = 2;
}

message MessageSearchResult {
  MessageSearchScopeKind scope = 1;
  string direct_chat_id = 2;
  string group_id = 3;
  string group_thread_id = 4;
  string message_id = 5;
  ChatUser author = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp edited_at = 8;
  string match_fragment = 9;
  MessageSearchPosition position = 10;
}

message SearchMessagesRequest {
  string query = 1;
  oneof scope {
    SearchDirectMessagesScope direct_scope = 2;
    SearchGroupMessagesScope group_scope = 3;
  }
  uint32 page_size = 4;
  MessageSearchCursor page_cursor = 5;
}

message SearchMessagesResponse {
  repeated MessageSearchResult results = 1;
  MessageSearchCursor next_page_cursor = 2;
  bool has_more = 3;
}

message SendGroupTextMessageRequest {
  string group_id = 1;
  // text остаётся optional-by-semantics: attachment-only сообщение передаёт пустую строку.
  // Полностью пустое сообщение без text и attachment_ids запрещено доменно.
  string text = 2;
  repeated string attachment_ids = 3;
  optional string reply_to_message_id = 4;
}

message SendGroupTextMessageResponse {
  GroupMessage message = 1;
}

message EditGroupMessageRequest {
  string group_id = 1;
  string message_id = 2;
  // text обязателен для edit: attachment-only message не получает synthetic text semantics.
  string text = 3;
}

message EditGroupMessageResponse {
  GroupMessage message = 1;
}

message DeleteMessageForEveryoneRequest {
  string chat_id = 1;
  string message_id = 2;
}

message DeleteMessageForEveryoneResponse {
  DirectChatMessage message = 1;
}

message PinMessageRequest {
  string chat_id = 1;
  string message_id = 2;
}

message PinMessageResponse {
  DirectChatMessage message = 1;
}

message UnpinMessageRequest {
  string chat_id = 1;
  string message_id = 2;
}

message UnpinMessageResponse {
  DirectChatMessage message = 1;
}
