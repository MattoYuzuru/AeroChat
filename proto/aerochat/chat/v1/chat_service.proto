message SendEncryptedDirectMessageV2Request {
  string chat_id = 1;
  // message_id назначается клиентом до fanout и остаётся стабильным logical identifier.
  string message_id = 2;
  string sender_crypto_device_id = 3;
  EncryptedDirectMessageV2OperationKind operation_kind = 4;
  optional string target_message_id = 5;
  uint32 revision = 6;
  // deliveries должны покрывать весь active target roster:
  // все active devices получателя и все active devices отправителя,
  // включая originating sender device для server-backed self-delivery.
  repeated EncryptedDirectMessageV2DeliveryInput deliveries = 7;
}

message SendEncryptedDirectMessageV2Response {
  EncryptedDirectMessageV2StoredEnvelope envelope = 1;
}

message ListEncryptedDirectMessageV2Request {
  string chat_id = 1;
  // viewer_crypto_device_id фиксирует, для какого локального active crypto device нужно вернуть opaque delivery.
  string viewer_crypto_device_id = 2;
  uint32 page_size = 3;
}

message ListEncryptedDirectMessageV2Response {
  repeated EncryptedDirectMessageV2Envelope envelopes = 1;
}

message GetEncryptedDirectMessageV2Request {
  string chat_id = 1;
  string message_id = 2;
  // viewer_crypto_device_id фиксирует, для какого локального active crypto device нужно вернуть opaque delivery.
  string viewer_crypto_device_id = 3;
}

message GetEncryptedDirectMessageV2Response {
  EncryptedDirectMessageV2Envelope envelope = 1;
}

message GetEncryptedGroupBootstrapRequest {
  string group_id = 1;
  // viewer_crypto_device_id фиксирует локальный active trusted crypto-device,
