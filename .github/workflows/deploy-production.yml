name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR tag для production rollout"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-rollout
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      DEPLOY_DIR: ${{ vars.AERO_PROD_DEPLOY_DIR }}
      COMPOSE_FILE: ${{ vars.AERO_PROD_COMPOSE_FILE }}
      EDGE_DOMAIN: ${{ vars.AERO_PROD_EDGE_DOMAIN }}
      MEDIA_EDGE_DOMAIN: ${{ vars.AERO_PROD_MEDIA_EDGE_DOMAIN }}
      SSH_HOST: ${{ secrets.AERO_PROD_SSH_HOST }}
      SSH_PORT: ${{ secrets.AERO_PROD_SSH_PORT }}
      SSH_USER: ${{ secrets.AERO_PROD_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.AERO_PROD_SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.AERO_PROD_SSH_KNOWN_HOSTS }}
    steps:
      - name: Validate rollout inputs
        run: |
          set -euo pipefail

          required_vars=(
            IMAGE_TAG
            DEPLOY_DIR
            COMPOSE_FILE
            EDGE_DOMAIN
            MEDIA_EDGE_DOMAIN
            SSH_HOST
            SSH_PORT
            SSH_USER
            SSH_PRIVATE_KEY
            SSH_KNOWN_HOSTS
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Переменная ${name} не задана"
              exit 1
            fi
          done

          if ! printf '%s' "$IMAGE_TAG" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$'; then
            echo "::error::image_tag содержит недопустимые символы"
            exit 1
          fi

          if ! printf '%s' "$EDGE_DOMAIN" | grep -Eq '^[A-Za-z0-9.-]+$'; then
            echo "::error::AERO_PROD_EDGE_DOMAIN содержит недопустимые символы"
            exit 1
          fi

          if ! printf '%s' "$MEDIA_EDGE_DOMAIN" | grep -Eq '^[A-Za-z0-9.-]+$'; then
            echo "::error::AERO_PROD_MEDIA_EDGE_DOMAIN содержит недопустимые символы"
            exit 1
          fi

      - name: Prepare SSH material
        run: |
          set -euo pipefail
          umask 077
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$RUNNER_TEMP/aero_prod_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$RUNNER_TEMP/aero_prod_known_hosts"

      - name: Roll out selected image tag
        run: |
          set -euo pipefail

          ssh_opts=(
            -i "$RUNNER_TEMP/aero_prod_key"
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$RUNNER_TEMP/aero_prod_known_hosts"
            -p "$SSH_PORT"
          )

          ssh_command=(
            bash
            -s
            --
            "$DEPLOY_DIR"
            "$COMPOSE_FILE"
            "$IMAGE_TAG"
            "$EDGE_DOMAIN"
            "$MEDIA_EDGE_DOMAIN"
          )

          # shellcheck disable=SC2029
          # Аргументы передаются в remote `bash -s -- ...` намеренно и не используются как часть shell-кода.
          ssh "${ssh_opts[@]}" "${SSH_USER}@${SSH_HOST}" "${ssh_command[@]}" <<'REMOTE'
          set -euo pipefail

          DEPLOY_DIR=$1
          COMPOSE_FILE=$2
          IMAGE_TAG=$3
          EDGE_DOMAIN=$4
          MEDIA_EDGE_DOMAIN=$5

          require_command() {
            local name="$1"
            if ! command -v "$name" >/dev/null 2>&1; then
              echo "Команда $name не найдена на сервере" >&2
              exit 1
            fi
          }

          wait_for_url() {
            local description="$1"
            local url="$2"
            shift 2

            local attempt=1
            while [ "$attempt" -le 30 ]; do
              if curl -fsS "$@" "$url" >/dev/null; then
                echo "$description: ok"
                return 0
              fi

              sleep 2
              attempt=$((attempt + 1))
            done

            echo "$description: failed" >&2
            return 1
          }

          read_env_var() {
            local file="$1"
            local key="$2"
            local line

            line="$(grep -m1 "^${key}=" "$file" || true)"
            if [ -z "$line" ]; then
              echo "Переменная ${key} не найдена в ${file}" >&2
              exit 1
            fi

            printf '%s\n' "${line#*=}"
          }

          read_optional_env_var() {
            local file="$1"
            local key="$2"
            local line

            line="$(grep -m1 "^${key}=" "$file" || true)"
            if [ -z "$line" ]; then
              printf '\n'
              return 0
            fi

            printf '%s\n' "${line#*=}"
          }

          update_env_var() {
            local file="$1"
            local key="$2"
            local value="$3"

            if grep -q "^${key}=" "$file"; then
              sed -i "s#^${key}=.*#${key}=${value}#" "$file"
              return
            fi

            printf '\n%s=%s\n' "$key" "$value" >> "$file"
          }

          require_command bash
          require_command curl
          require_command docker
          require_command grep
          require_command sed

          if ! docker compose version >/dev/null 2>&1; then
            echo "Docker Compose plugin не найден на сервере" >&2
            exit 1
          fi

          mkdir -p "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"

          if [ ! -f .env.server ]; then
            echo ".env.server не найден в $DEPLOY_DIR" >&2
            exit 1
          fi

          if [ ! -f .env.server.secrets ]; then
            echo ".env.server.secrets не найден в $DEPLOY_DIR" >&2
            exit 1
          fi

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "Compose file $COMPOSE_FILE не найден в $DEPLOY_DIR" >&2
            exit 1
          fi

          shared_edge_host_ip="$(read_env_var .env.server AERO_SHARED_EDGE_HOST_IP)"
          web_host_port="$(read_env_var .env.server AERO_WEB_HOST_PORT)"
          gateway_host_port="$(read_env_var .env.server AERO_GATEWAY_HOST_PORT)"
          media_host_port="$(read_env_var .env.server AERO_MEDIA_HOST_PORT)"
          web_push_subscriber="$(read_optional_env_var .env.server AERO_WEB_PUSH_SUBSCRIBER)"
          web_push_public_key="$(read_optional_env_var .env.server AERO_WEB_PUSH_VAPID_PUBLIC_KEY)"
          web_push_private_key="$(read_optional_env_var .env.server.secrets AERO_WEB_PUSH_VAPID_PRIVATE_KEY)"

          if [ "$shared_edge_host_ip" = "127.0.0.1" ]; then
            echo "AERO_SHARED_EDGE_HOST_IP не должен оставаться loopback для shared Traefik edge" >&2
            exit 1
          fi

          web_push_values_set=0
          if [ -n "$web_push_subscriber" ]; then
            web_push_values_set=$((web_push_values_set + 1))
          fi
          if [ -n "$web_push_public_key" ]; then
            web_push_values_set=$((web_push_values_set + 1))
          fi
          if [ -n "$web_push_private_key" ]; then
            web_push_values_set=$((web_push_values_set + 1))
          fi

          if [ "$web_push_values_set" -eq 0 ]; then
            echo "::warning::AERO_WEB_PUSH_* не заданы: browser push останется отключённым на production"
          elif [ "$web_push_values_set" -ne 3 ]; then
            echo "Неполная web push конфигурация: должны быть заданы AERO_WEB_PUSH_SUBSCRIBER, AERO_WEB_PUSH_VAPID_PUBLIC_KEY и AERO_WEB_PUSH_VAPID_PRIVATE_KEY" >&2
            exit 1
          fi

          previous_tag="$(grep '^AERO_IMAGE_TAG=' .env.server | head -n1 | cut -d= -f2- || true)"
          echo "Текущий AERO_IMAGE_TAG: ${previous_tag:-<не задан>}"

          update_env_var .env.server AERO_IMAGE_TAG "$IMAGE_TAG"
          echo "Новый AERO_IMAGE_TAG: $IMAGE_TAG"

          docker compose \
            --env-file .env.server \
            --env-file .env.server.secrets \
            -f "$COMPOSE_FILE" \
            config >/dev/null

          docker compose \
            --env-file .env.server \
            --env-file .env.server.secrets \
            -f "$COMPOSE_FILE" \
            pull

          docker compose \
            --env-file .env.server \
            --env-file .env.server.secrets \
            -f "$COMPOSE_FILE" \
            up -d

          docker compose \
            --env-file .env.server \
            --env-file .env.server.secrets \
            -f "$COMPOSE_FILE" \
            ps

          wait_for_url "Web upstream" "http://${shared_edge_host_ip}:${web_host_port}/"
          wait_for_url "Gateway upstream readyz" "http://${shared_edge_host_ip}:${gateway_host_port}/readyz"
          wait_for_url "Media upstream live" "http://${shared_edge_host_ip}:${media_host_port}/minio/health/live"
          wait_for_url "HTTPS web root" "https://${EDGE_DOMAIN}/"
          wait_for_url "HTTPS healthz" "https://${EDGE_DOMAIN}/healthz"
          wait_for_url "HTTPS readyz" "https://${EDGE_DOMAIN}/readyz"
          wait_for_url "HTTPS media live" "https://${MEDIA_EDGE_DOMAIN}/minio/health/live"

          if [ -n "$previous_tag" ]; then
            echo "Для rollback используй предыдущий tag: $previous_tag"
          fi
          REMOTE

      - name: Write job summary
        run: |
          {
            echo "## Production rollout"
            echo
            echo "- image_tag: \`$IMAGE_TAG\`"
            echo "- deploy dir: \`$DEPLOY_DIR\`"
            echo "- domain: \`$EDGE_DOMAIN\`"
            echo "- media domain: \`$MEDIA_EDGE_DOMAIN\`"
          } >> "$GITHUB_STEP_SUMMARY"
